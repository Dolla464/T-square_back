name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        id: deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /www/wwwroot/api.tsquarecenter.com
            
            # ✅ وضع الصيانة
            php artisan down --message="جاري التحديث... سنعود قريباً" --retry=60
            
            # جلب التغييرات
            git pull origin main
            
            # تثبيت الاعتماديات
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # تطبيق migrations
            php artisan migrate --force --step
            
            # تجميع الـ config
            php artisan config:cache
            
            # تجميع الـ routes
            php artisan route:cache
            
            # تجميع الـ views
            php artisan view:cache
            
            # تجميع الـ events
            php artisan event:cache
            
            # مسح الـ cache القديم
            php artisan cache:clear
            
            # إنشاء رابط storage
            php artisan storage:link
            
            # تحسين autoloader
            composer dump-autoload --optimize
            
            # ✅ إعادة تشغيل PM2 (Queue Workers + Scheduler)
            pm2 restart tsquare-queue tsquare-scheduler
            
            # ✅ إعادة تشغيل PHP-FPM
            sudo systemctl reload php-fpm-83
            
            # إزالة وضع الصيانة
            php artisan up

      # ✅ إشعار Slack - Success
      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Backend Deployed Successfully",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Backend Deployed Successfully",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PM2 Status:*\ntsquare-queue ✅\ntsquare-scheduler ✅"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      # ❌ إشعار Slack - Failure
      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Backend Deploy Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Backend Deploy Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Error:*\nCheck the logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
