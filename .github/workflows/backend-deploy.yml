name: Deploy Backend

on:
  push:
    branches:
      - main

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /www/wwwroot/api.tsquarecenter.com
            
            # ✅ إلغاء التغييرات المحلية قبل git pull
            git checkout -- .
            git clean -fd
            
            # ✅ git pull بشكل صحيح
            git pull origin main
            
            # تثبيت الاعتماديات
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # ✅ migrate بدون --step (إذا كان هناك مشاكل)
            php artisan migrate --force || true
            
            # ✅ تجميع الـ cache (مع || true لتجاوز الأخطاء)
            php artisan config:cache
            php artisan route:cache || true
            php artisan view:cache
            php artisan event:cache || true
            
            # مسح الـ cache
            php artisan cache:clear
            
            # ✅ إنشاء رابط storage (إذا لم يكن موجوداً)
            php artisan storage:link || true
            
            # تحسين autoloader
            composer dump-autoload --optimize
            
            # ✅ إعادة تشغيل PM2
            pm2 restart tsquare-queue tsquare-scheduler
            
            # ✅ إعادة تشغيل PHP-FPM
            sudo systemctl reload php-fpm-83
