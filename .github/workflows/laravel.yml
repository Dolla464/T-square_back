name: T-Square Backend CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: t_square_test
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_ENV: testing

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: t_square_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, dom, curl, libxml, pdo_mysql, zip, gd, bcmath, fileinfo, exif
        coverage: xdebug

    - name: Cache Composer dependencies
      uses: actions/cache@v4
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader

    - name: Generate key
      run: php artisan key:generate

    - name: Install Node Dependencies
      run: npm ci

    - name: Directory Permissions
      run: chmod -R 775 storage bootstrap/cache

    - name: Run Migrations
      run: php artisan migrate --force

    - name: Run Pint (Code Style)
      run: ./vendor/bin/pint --test

    - name: Execute tests with Coverage
      run: php artisan test --coverage-html=coverage-report

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage-report/
        retention-days: 7

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: laravel-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e
          cd /www/wwwroot/api.tsquarecenter.com
          git checkout main
          git pull origin main
          composer install --no-dev --no-interaction --no-ansi --prefer-dist --optimize-autoloader
          npm ci --omit=dev
          npm run build
          php artisan migrate --force
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          php artisan storage:link
          chown -R www:www storage/fonts
          chmod -R 775 storage/fonts
          pm2 restart tsquare-queue tsquare-scheduler tsquare-reverb
